<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Derewol AI</title>
    <style>
      /* Styles pour Derewol AI - Thème de l'app */
      :root {
        --vert: #1e4d2b;
        --vert-clair: #2d6a4f;
        --jaune: #f5c842;
        --jaune-clair: #f7d794;
        --gris-fonce: #2d3748;
        --gris-clair: #4a5568;
        --blanc: #ffffff;
        --noir: #1a202c;
        --rouge: #e53e3e;
        --bleu: #3182ce;
        --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        --border-radius: 8px;
        --transition: all 0.3s ease;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--noir);
        color: var(--blanc);
        margin: 0;
        padding: 20px;
        line-height: 1.6;
      }

      .container {
        max-width: 800px;
        margin: 0 auto;
      }

      .header {
        text-align: center;
        margin-bottom: 30px;
      }

      .logo {
        font-size: 2.5em;
        font-weight: bold;
        color: var(--jaune);
        margin-bottom: 10px;
      }

      .credits {
        font-size: 1.1em;
        color: var(--gris-clair);
      }

      .buttons {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-bottom: 30px;
        flex-wrap: wrap;
      }

      .btn {
        background-color: var(--vert);
        color: var(--blanc);
        border: none;
        padding: 12px 20px;
        border-radius: var(--border-radius);
        cursor: pointer;
        font-size: 1em;
        transition: var(--transition);
        box-shadow: var(--shadow);
      }

      .btn:hover {
        background-color: var(--vert-clair);
        transform: translateY(-2px);
        box-shadow: 0 6px 8px rgba(0, 0, 0, 0.15);
      }

      .btn:disabled {
        background-color: var(--gris-fonce);
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .results {
        margin-top: 30px;
      }

      .card {
        background-color: var(--gris-fonce);
        border: 1px solid var(--vert);
        border-radius: var(--border-radius);
        padding: 15px;
        margin-bottom: 15px;
        box-shadow: var(--shadow);
        transition: var(--transition);
      }

      .card:hover {
        border-color: var(--jaune);
        box-shadow: 0 6px 8px rgba(0, 0, 0, 0.15);
      }

      .card.success {
        border-left: 4px solid var(--vert);
      }

      .card.warning {
        border-left: 4px solid var(--jaune);
      }

      .card h3 {
        margin-top: 0;
        color: var(--jaune);
      }

      .details {
        margin-top: 20px;
      }

      .detail-item {
        margin-bottom: 10px;
        padding: 8px 12px;
        background-color: rgba(30, 77, 43, 0.1);
        border-radius: 4px;
        border-left: 3px solid var(--vert);
      }

      .recharge {
        text-align: center;
        margin-top: 30px;
      }

      .recharge-options {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 15px;
        flex-wrap: wrap;
      }

      .recharge-btn {
        background-color: var(--jaune);
        color: var(--noir);
        border: none;
        padding: 10px 15px;
        border-radius: var(--border-radius);
        cursor: pointer;
        font-size: 0.9em;
        transition: var(--transition);
        font-weight: 600;
      }

      .recharge-btn:hover {
        background-color: var(--jaune-clair);
        transform: translateY(-1px);
        box-shadow: var(--shadow);
      }

      .hidden {
        display: none;
      }

      /* Responsive design */
      @media (max-width: 768px) {
        .buttons {
          flex-direction: column;
          align-items: center;
        }

        .recharge-options {
          flex-direction: column;
          align-items: center;
        }

        .btn,
        .recharge-btn {
          width: 100%;
          max-width: 250px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="logo">Derewol AI ✦</div>
        <div class="credits" id="credits-display">
          Chargement des crédits...
        </div>
      </div>

      <div class="buttons">
        <button class="btn" id="btn-analyze-doc">📄 Analyser document</button>
        <button class="btn" id="btn-analyze-excel">📊 Analyser Excel</button>
        <button class="btn" id="btn-ocr">🔍 OCR Scan</button>
      </div>

      <div class="results" id="results" class="hidden">
        <div class="card success" id="suggestions-card">
          <h3>Suggestions</h3>
          <ul id="suggestions-list"></ul>
        </div>

        <div class="card warning" id="warnings-card" class="hidden">
          <h3>Avertissements</h3>
          <ul id="warnings-list"></ul>
        </div>

        <div class="details">
          <div class="card">
            <h3>Détails d'impression</h3>
            <div class="detail-item">
              <strong>Orientation :</strong> <span id="orientation">-</span>
            </div>
            <div class="detail-item">
              <strong>Mode :</strong> <span id="mode">-</span>
            </div>
            <div class="detail-item">
              <strong>Type de contenu :</strong>
              <span id="content-type">-</span>
            </div>
            <div class="detail-item">
              <strong>Format recommandé :</strong> <span id="format">-</span>
            </div>
          </div>
        </div>
      </div>

      <div class="recharge hidden" id="recharge-section">
        <p>Vous n'avez plus de crédits IA. Recharger pour continuer :</p>
        <div class="recharge-options">
          <button class="recharge-btn" data-credits="10" data-amount="2000">
            2 000 XOF = 10 crédits
          </button>
          <button class="recharge-btn" data-credits="20" data-amount="3500">
            3 500 XOF = 20 crédits
          </button>
        </div>
      </div>
    </div>

    <script src="derewolAI.js"></script>
  </body>
</html>
